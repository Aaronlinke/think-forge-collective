<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Think Forge Automation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 350px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .status {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
    }
    
    .dot.connected {
      background: #10b981;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .button {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    
    .button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-1px);
    }
    
    .button:active {
      transform: translateY(0);
    }
    
    .button.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
    }
    
    .input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      color: white;
      font-size: 12px;
      margin-bottom: 12px;
    }
    
    .input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    
    .info {
      font-size: 11px;
      opacity: 0.7;
      text-align: center;
      margin-top: 12px;
    }
    
    .section {
      margin-bottom: 16px;
    }
    
    .section h3 {
      font-size: 12px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧠 Think Forge</h1>
    <p>Browser Automation</p>
  </div>
  
  <div class="status">
    <div class="status-indicator">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Getrennt</span>
    </div>
    <div id="sessionInfo" style="font-size: 11px; opacity: 0.7;"></div>
  </div>
  
  <div class="section">
    <h3>Verbindung</h3>
    <input 
      type="text" 
      class="input" 
      id="serverUrl" 
      placeholder="wss://your-project.supabase.co/functions/v1/browser-bridge"
      value="wss://cyzgmlgbpbcyomlkvrrm.supabase.co/functions/v1/browser-bridge"
    />
    <button class="button primary" id="connectBtn">Verbinden</button>
    <button class="button" id="disconnectBtn">Trennen</button>
  </div>
  
  <div class="section">
    <h3>Quick Actions</h3>
    <button class="button" id="screenshotBtn">📸 Screenshot</button>
    <button class="button" id="pageInfoBtn">ℹ️ Seiten-Info</button>
  </div>
  
  <div class="info">
    <p>Öffne die Think Forge App für volle Kontrolle</p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
